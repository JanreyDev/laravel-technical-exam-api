services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: technical-exam-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: technical_exam
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      JSONPLACEHOLDER_BASE_URL: https://jsonplaceholder.typicode.com
    ports:
      - "8000:8000"

  mysql:
    image: mysql:8.0
    container_name: technical-exam-mysql
    environment:
      MYSQL_DATABASE: technical_exam
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
